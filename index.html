<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>給咪咪的餓靈古堡</title>
    <style>
        :root { 
            --primary: #B59090; --bg: #E3D7D7; --accent: #6E5A5A; 
            --castle-bg: #F0E8E8; --input-bg: #C7B1B1;
            --loading-color: #B59090; /* 預設隨主題色 */
        }
        [data-theme="orange"] {
            --primary: #C69B7B; --bg: #EAE0D5; --accent: #785A43; 
            --castle-bg: #F5EFE9; --input-bg: #D9C2B1;
            --loading-color: #C69B7B;
        }
        [data-theme="blue"] {
            --primary: #8E9AAF; --bg: #D8DEE9; --accent: #4A5568; 
            --castle-bg: #E5E9F0; --input-bg: #B0B9C8;
            --loading-color: #8E9AAF;
        }
        [data-theme="green"] {
            --primary: #949B86; --bg: #E2E4DC; --accent: #4B5141; 
            --castle-bg: #ECEDE8; --input-bg: #B7BCA9;
            --loading-color: #949B86;
        }
        [data-theme="black"] {
            --primary: #6B705C; --bg: #D4D5D0; --accent: #333533; 
            --castle-bg: #E5E5E2; --input-bg: #8D917A;
            --loading-color: #6B705C;
        }

        body { 
            background: var(--bg); color: var(--accent); text-align: center;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;
            transition: all 0.4s ease; min-height: 100vh;
        }
        .theme-panel { margin-bottom: 25px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .theme-panel button { 
            border: 1.5px solid var(--primary); background: #fff; color: var(--primary); 
            padding: 7px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold;
            transition: 0.3s;
        }
        .theme-panel button:hover { background: var(--primary); color: white; }

        .castle { 
            max-width: 420px; width: 100%; border: 2px solid var(--primary); 
            padding: 30px; background: var(--castle-bg); border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); box-sizing: border-box; 
        }
        h1 { color: var(--primary); margin: 0 0 15px 0; letter-spacing: 1px; }
        .lang-box { text-align: right; margin-bottom: 12px; }
        .lang-box button { background: none; border: 1px solid var(--primary); color: var(--primary); cursor: pointer; padding: 3px 10px; font-size: 12px; border-radius: 5px; }
        .lang-box button.active { background: var(--primary); color: #fff; }

        .select-group { display: flex; gap: 10px; margin: 20px 0; }
        select { 
            flex: 1; padding: 12px; 
            background: var(--input-bg); color: #FFFFFF !important; 
            border: none; font-size: 15px; border-radius: 12px; font-weight: bold;
            cursor: pointer; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        select option { color: #555; background: #fff; }

        .main-btn { 
            width: 100%; padding: 16px; background: var(--primary); color: white; 
            border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer; 
            border-radius: 12px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .main-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 結果顯示區塊：分為上下兩部分 */
        #result-display { 
            height: 140px; display: flex; flex-direction: column; 
            margin-top: 25px; border: 2px dashed var(--primary); border-radius: 15px; 
            background: rgba(255,255,255,0.3); position: relative; overflow: hidden;
        }

        /* 上半部：進度與數字 */
        .loading-zone { height: 50px; position: relative; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .loading-bar { position: absolute; bottom: 0; left: 0; height: 4px; background-color: var(--loading-color); width: 0%; transition: width 0.1s linear; }
        .loading-text { font-size: 1.1rem; font-weight: bold; color: var(--primary); opacity: 0; }
        .loading-text.show { opacity: 1; }

        /* 下半部：食物名稱 */
        .food-zone { flex: 1; display: flex; align-items: center; justify-content: center; }
        .food-name { font-size: 1.8rem; color: var(--accent); font-weight: bold; }

        /* 最終結果彈出動畫 */
        @keyframes popIn {
            0% { transform: scale(0.6); opacity: 0; }
            70% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        #map-btn { display: none; margin-top: 20px; padding: 15px; background: var(--accent); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; transition: 0.3s; }
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }
    </style>
</head>
<body>

<div class="theme-panel">
    <button onclick="setTheme('default')">粉</button>
    <button onclick="setTheme('orange')">橘</button>
    <button onclick="setTheme('blue')">藍</button>
    <button onclick="setTheme('green')">綠</button>
    <button onclick="setTheme('black')">灰</button>
</div>

<div class="castle" id="castle-box">
    <div class="lang-box">
        <button id="z-btn" class="active" onclick="switchL('zh')">中</button>
        <button id="e-btn" onclick="switchL('en')">EN</button>
    </div>
    <h1 id="t">給咪咪的餓靈古堡</h1>
    
    <div class="select-group">
        <select id="city-select" onchange="updateDistricts()">
            <option value="" disabled selected>縣市</option>
        </select>
        <select id="dist-select">
            <option value="" disabled selected>行政區</option>
        </select>
    </div>

    <button class="main-btn" id="b" onclick="go()">末世來臨 十二星座選擇你的晚餐</button>

    <div id="result-display">
        <div class="loading-zone">
            <div class="loading-text" id="loading-text">0%</div>
            <div class="loading-bar" id="loading-bar"></div>
        </div>
        <div class="food-zone">
            <div id="f-text" class="food-name">? ? ?</div>
        </div>
    </div>

    <a id="map-btn" href="#" target="_blank">搜尋附近物資</a>
</div>

<script>
    function setTheme(t) {
        document.documentElement.setAttribute('data-theme', t === 'default' ? '' : t);
    }

    const areaData = {
        tp: {
            name: {zh: "台北市", en: "Taipei"},
            list: [
                {z:"中正區", e:"Zhongzheng"}, {z:"大同區", e:"Datong"}, {z:"中山區", e:"Zhongshan"}, 
                {z:"松山區", e:"Songshan"}, {z:"大安區", e:"Daan"}, {z:"萬華區", e:"Wanhua"}, 
                {z:"信義區", e:"Xinyi"}, {z:"士林區", e:"Shilin"}, {z:"北投區", e:"Beitou"}, 
                {z:"內湖區", e:"Neihu"}, {z:"南港區", e:"Nangang"}, {z:"文山區", e:"Wenshan"}
            ]
        },
        ntp: {
            name: {zh: "新北市", en: "New Taipei"},
            list: [
                {z:"板橋區", e:"Banqiao"}, {z:"三重區", e:"Sanchong"}, {z:"中和區", e:"Zhonghe"}, 
                {z:"永和區", e:"Yonghe"}, {z:"新莊區", e:"Xinzhuang"}, {z:"新店區", e:"Xindian"}, 
                {z:"土城區", e:"Tucheng"}, {z:"蘆洲區", e:"Luzhou"}, {z:"汐止區", e:"Xizhi"}, 
                {z:"樹林區", e:"Shulin"}, {z:"淡水區", e:"Tamsui"}, {z:"林口區", e:"Linkou"}, 
                {z:"五股區", e:"Wugu"}, {z:"泰山區", e:"Taishan"}, {z:"三峽區", e:"Sanxia"}, 
                {z:"鶯歌區", e:"Yingge"}, {z:"深坑區", e:"Shenkeng"}, {z:"石碇區", e:"Shiding"}, 
                {z:"坪林區", e:"Pinglin"}, {z:"三芝區", e:"Sanzhi"}, {z:"石門區", e:"Shimen"}, 
                {z:"八里區", e:"Bali"}, {z:"平溪區", e:"Pingxi"}, {z:"雙溪區", e:"Shuangxi"}, 
                {z:"貢寮區", e:"Gongliao"}, {z:"金山區", e:"Jinshan"}, {z:"萬里區", e:"Wanli"}, 
                {z:"烏來區", e:"Wulai"}, {z:"瑞芳區", e:"Ruifang"}
            ]
        }
    };

    const foods = [
        {z:"牛肉麵", e:"Beef Noodles"}, {z:"滷肉飯", e:"Pork Rice"}, {z:"鹽酥雞", e:"Fried Chicken"},
        {z:"拉麵", e:"Ramen"}, {z:"火鍋", e:"Hot Pot"}, {z:"壽司", e:"Sushi"}, {z:"燒肉", e:"BBQ"},
        {z:"披薩", e:"Pizza"}, {z:"漢堡", e:"Burger"}, {z:"泰式料理", e:"Thai Food"},
        {z:"臭豆腐", e:"Stinky Tofu"}, {z:"水餃", e:"Dumplings"}, {z:"義大利麵", e:"Pasta"},
        {z:"蛋餅", e:"Dan Bing"}, {z:"雞肉飯", e:"Chicken Rice"}, {z:"小籠包", e:"Xiao Long Bao"}
    ];
    
    let L = 'zh';

    function switchL(lang) {
        L = lang;
        document.getElementById('t').innerText = L==='zh' ? "給咪咪的餓靈古堡" : "Mimi's Feast";
        document.getElementById('b').innerText = L==='zh' ? "末世來臨 十二星座選擇你的晚餐" : "The apocalypse is coming; the twelve zodiac signs choose their dinner.";
        document.getElementById('map-btn').innerText = L==='zh' ? "搜尋附近物資" : "Search for nearby supplies";
        document.getElementById('z-btn').className = L==='zh' ? 'active' : '';
        document.getElementById('e-btn').className = L==='en' ? 'active' : '';
        initCitySelect();
    }

    function initCitySelect() {
        const cityS = document.getElementById('city-select');
        const distS = document.getElementById('dist-select');
        cityS.innerHTML = `<option value="" disabled selected>${L==='zh'?'縣市':'City'}</option>`;
        for(let key in areaData) {
            let o = document.createElement('option');
            o.value = key;
            o.innerText = areaData[key].name[L];
            cityS.appendChild(o);
        }
        distS.innerHTML = `<option value="" disabled selected>${L==='zh'?'行政區':'District'}</option>`;
    }

    function updateDistricts() {
        const cityKey = document.getElementById('city-select').value;
        const distS = document.getElementById('dist-select');
        distS.innerHTML = `<option value="" disabled selected>${L==='zh'?'行政區':'District'}</option>`;
        
        if(cityKey && areaData[cityKey]) {
            areaData[cityKey].list.forEach(item => {
                let o = document.createElement('option');
                o.value = item.z;
                o.innerText = L==='zh' ? item.z : item.e;
                distS.appendChild(o);
            });
        }
    }

    function go() {
        const cityVal = document.getElementById('city-select').value;
        const distVal = document.getElementById('dist-select').value;
        if(!cityVal || !distVal) return alert(L==='zh'?"請先完成地區選擇！":"Please select both City and District!");

        const btn = document.getElementById('b'), fText = document.getElementById('f-text'), mb = document.getElementById('map-btn'), box = document.getElementById('castle-box'), bar = document.getElementById('loading-bar'), lt = document.getElementById('loading-text');

        // Reset
        btn.disabled = true; mb.style.display = 'none'; box.classList.add('shake');
        fText.classList.remove('pop'); fText.innerText = '...';
        bar.style.width = '0%'; lt.innerText = '0%'; lt.classList.add('show');

        let progress = 0;
        let loadInterval = setInterval(() => {
            progress += Math.random() * 8;
            if(progress >= 100) {
                progress = 100;
                clearInterval(loadInterval);
            }
            bar.style.width = progress + '%';
            lt.innerText = Math.floor(progress) + '%';
        }, 120);

        let rollCount = 0;
        let rollInterval = setInterval(() => {
            fText.innerText = foods[Math.floor(Math.random() * foods.length)][L==='zh'?'z':'e'];
            if(rollCount++ > 20 && progress >= 100) {
                clearInterval(rollInterval);
                let final = foods[Math.floor(Math.random() * foods.length)];
                fText.innerText = L === 'zh' ? final.z : final.e;
                fText.classList.add('pop');

                let cityName = areaData[cityVal].name.zh;
                mb.href = "https://www.google.com/maps/search/" + encodeURIComponent(cityName + distVal + " " + final.z);
                mb.style.display = 'block';
                btn.disabled = false; box.classList.remove('shake');
                setTimeout(() => lt.classList.remove('show'), 1000);
            }
        }, 80);
    }
    window.onload = () => switchL('zh');
</script>
</body>
</html>
